name: Release

# Tag format: <crate>-v<semver>, e.g. `backbone-core-v2.0.0` or
# `backbone-core-v2.0.0-rc1`. Each member crate in this workspace is released
# independently; a single `v*` tag would be ambiguous across 15 crates with
# divergent versions.

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag into crate + version
        id: parse
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" != *-v* ]]; then
            echo "Tag '$tag' does not match '<crate>-v<version>' pattern" >&2
            exit 1
          fi
          crate="${tag%-v*}"
          version="${tag##*-v}"
          if [ ! -f "$crate/Cargo.toml" ]; then
            echo "Crate '$crate' not found at $crate/Cargo.toml" >&2
            exit 1
          fi
          manifest_version="$(awk -F'"' '/^version *= *"/ {print $2; exit}' "$crate/Cargo.toml")"
          if [ "$manifest_version" != "$version" ]; then
            echo "Tag version '$version' disagrees with $crate/Cargo.toml ('$manifest_version')" >&2
            exit 1
          fi
          echo "crate=$crate"     >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Verify crate builds and tests pass
        run: |
          cargo build -p "${{ steps.parse.outputs.crate }}" --all-features
          cargo test  -p "${{ steps.parse.outputs.crate }}" --all-features

      - name: Extract release notes from CHANGELOG.md
        run: |
          crate="${{ steps.parse.outputs.crate }}"
          version="${{ steps.parse.outputs.version }}"
          changelog="$crate/CHANGELOG.md"
          # Copy the body under `## [<header>]` up to (but not including) the
          # next `## [` header. Prefer the exact version section; if missing,
          # fall back to `## [Unreleased]` — the convention is to rename that
          # section to the tag's version when cutting a release, but this
          # covers the case where the rename hasn't happened yet.
          extract() {
            awk -v hdr="## [$1]" '
              index($0, hdr) == 1 { found=1; next }
              found && /^## \[/  { exit }
              found              { print }
            ' "$changelog"
          }
          : > release_notes.md
          if [ -f "$changelog" ]; then
            extract "$version"    > release_notes.md
            [ -s release_notes.md ] || extract "Unreleased" > release_notes.md
          fi
          [ -s release_notes.md ] || echo "Release $GITHUB_REF_NAME" > release_notes.md

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p "${{ steps.parse.outputs.crate }}" --all-features

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.parse.outputs.version, '-') }}
