name: Release

# Monorepo tag-driven release.
#
# Distribution model: this workspace is consumed as git deps, not crates.io.
# A single `v<version>` tag snapshots the entire workspace at one commit;
# downstream projects pin with `{ git = "...", tag = "v<version>" }`.
#
# The tag's version MUST equal `[workspace.metadata.release].version` in the
# root Cargo.toml — the workflow refuses to release if they disagree.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        id: verify
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          workspace_version="$(cargo metadata --format-version 1 --no-deps \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["metadata"]["release"]["version"])')"
          if [ "$tag_version" != "$workspace_version" ]; then
            echo "Tag '$GITHUB_REF_NAME' (version '$tag_version') disagrees with" >&2
            echo "[workspace.metadata.release].version = '$workspace_version'." >&2
            echo "Bump the workspace version in Cargo.toml or retag." >&2
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Build and test the entire workspace
        run: |
          cargo build --workspace --all-features
          cargo test  --workspace --all-features

      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${{ steps.verify.outputs.version }}"
          # Copy the body under `## [<header>]` up to (but not including) the
          # next `## [` header. Prefer the exact version section; if missing,
          # fall back to `## [Unreleased]`.
          extract() {
            awk -v hdr="## [$1]" '
              index($0, hdr) == 1 { found=1; next }
              found && /^## \[/  { exit }
              found              { print }
            ' CHANGELOG.md
          }
          : > release_notes.md
          if [ -f CHANGELOG.md ]; then
            extract "$version"    > release_notes.md
            [ -s release_notes.md ] || extract "Unreleased" > release_notes.md
          fi
          [ -s release_notes.md ] || echo "Release $GITHUB_REF_NAME" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.verify.outputs.version, '-') }}
